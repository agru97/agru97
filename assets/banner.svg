<svg width="800" height="210" xmlns="http://www.w3.org/2000/svg">
  <style>
    .name {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
      font-size: 80px;
      fill: #0d0d0d;
    }
    .sub {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
      font-size: 40px;
      fill: #0d0d0d;
    }
    .tag {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
      font-size: 18px;
      fill: #0d0d0d;
    }
  </style>
  <!-- neon yellow background -->
  <rect width="800" height="210" fill="#CCFF00"/>
  <!-- thick black border -->
  <rect x="2" y="2" width="796" height="206" fill="none" stroke="#0d0d0d" stroke-width="4"/>
  <!-- brutal offset shadow box -->
  <rect x="6" y="6" width="796" height="206" fill="none" stroke="#0d0d0d" stroke-width="2" opacity="0.15"/>
  <!-- text -->
  <text x="36" y="90" class="name">ADRIAN</text>
  <text x="36" y="145" class="sub">GRUBER</text>
  <!-- divider line -->
  <line x1="36" y1="160" x2="360" y2="160" stroke="#0d0d0d" stroke-width="3"/>
  <text x="36" y="190" class="tag">FULLSTACK DEV — BCN</text>
</svg>
